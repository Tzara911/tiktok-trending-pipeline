name: tiktok-daily-pipeline

on:
  schedule:
    - cron: "20 22 * * *"   # UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
         set -euo pipefail
         mkdir -p logs
         python tiktok_pipeline.py | tee "logs/run_$(date -u +%F_%H%M%S)_utc.log"
         exit ${PIPESTATUS[0]}
      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiktok_outputs
          path: |
            *.csv
            *.json
            *.pdf
            logs/**
